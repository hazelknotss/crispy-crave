# Crispy Crave stack (Apache+PHP in Docker, MySQL, phpMyAdmin).
#
# MySQL is published to your Windows/Mac host as port 3307 -> container 3306.
# phpMyAdmin: http://localhost:8081/
#
# When you run the app with Windows PHP (serve.ps1), NOT inside Docker, set:
#   DB_HOST=127.0.0.1   DB_PORT=3307   DB_USER=chicken   DB_PASS=chicken_secret
# Or double-click:  serve-docker-db.bat
#
# Inside the "web" container, DB_HOST=mysql (already set in environment below).

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/chicken_ordering
    environment:
      APP_BASE_PATH: /chicken_ordering
      DB_HOST: mysql
      DB_NAME: chicken_ordering
      DB_USER: chicken
      DB_PASS: chicken_secret
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_change_me
      MYSQL_DATABASE: chicken_ordering
      MYSQL_USER: chicken
      MYSQL_PASSWORD: chicken_secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./chicken_ordering.sql:/docker-entrypoint-initdb.d/01-dump.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_secret_change_me"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin:5
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root_secret_change_me
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
