# Debian/Ubuntu Apache 2.4 - fix "403 Forbidden" on http://127.0.0.1:8080/ or from your phone.
#
# Edit DOCROOT below to the folder that contains index.php (copy of this project on Linux).
#
# 1) sudo cp apache-lan.example.conf /etc/apache2/sites-available/chicken-ordering.conf
# 2) sudo nano /etc/apache2/sites-available/chicken-ordering.conf   # set DocumentRoot + Directory path
# 3) Ensure Listen 8080 exists ONCE:
#      grep -r Listen /etc/apache2/ports.conf /etc/apache2/ports-available/ 2>/dev/null
#      echo 'Listen 8080' | sudo tee /etc/apache2/ports-available/custom-8080.conf
#      (then include that file from ports.conf if your layout needs it - or add Listen 8080 to ports.conf)
# 4) See what is already bound to 8080 (fix duplicates):
#      sudo apache2ctl -S
# 5) If another site uses *:8080, disable it:  sudo a2dissite THAT-SITE
# 6) sudo a2ensite chicken-ordering
# 7) sudo apache2ctl configtest && sudo systemctl reload apache2
#
# If 403 on 127.0.0.1 still happens:
#   - sudo tail -50 /var/log/apache2/error.log
#   - Fix ownership:  sudo chown -R www-data:www-data /path/to/chicken_ordering
#   - Fix perms:      sudo find /path/to/chicken_ordering -type d -exec chmod 755 {} \;
#                    sudo find /path/to/chicken_ordering -type f -exec chmod 644 {} \;
#
# Bypass Apache entirely (WSL/Debian): from project directory run  ./php-dev-server.sh 8080

<VirtualHost *:8080>
    ServerName localhost

    DocumentRoot /var/www/chicken_ordering

    <Directory /var/www/chicken_ordering>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    DirectoryIndex index.php index.html

    ErrorLog ${APACHE_LOG_DIR}/chicken-ordering-error.log
    CustomLog ${APACHE_LOG_DIR}/chicken-ordering-access.log combined
</VirtualHost>
